canvas.width=window.innerWidth;

let letters="01RZX";

let fontSize=14;
let columns=canvas.width/fontSize;

let drops=[];

ctx.fillStyle="rgba(0,0,0,0.05)";

drops[i]++;
}
requestAnimationFrame(draw);
}
draw();
